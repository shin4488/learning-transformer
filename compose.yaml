services:
  # 開発サーバ: docker compose up
  # http://localhost:5173 でプレビュー(md を編集すると即時反映)
  docs:
    image: node:20-slim
    working_dir: /app
    volumes:
      - .:/app
      # node_modules はホストと共有せずコンテナ専用にする(OS差異による不整合防止)
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"

  # 本番ビルド: docker compose run --rm build
  # 出力は .vitepress/dist に生成される
  build:
    image: node:20-slim
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: sh -c "npm ci && npm run build"

volumes:
  node_modules:
